<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HelpMap — Canindé</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep:  #1B4332;
      --green-mid:   #2D6A4F;
      --green-light: #52B788;
      --sand:        #F5F0E8;
      --sand-dark:   #EAE4D8;
      --coral:       #E8603C;
      --white:       #FFFFFF;
      --text-dark:   #1A1A1A;
      --text-mid:    #4A4A4A;
      --text-soft:   #7A7A7A;
      --shadow-sm:   0 1px 4px rgba(0,0,0,.10);
      --shadow-md:   0 4px 16px rgba(0,0,0,.13);
      --shadow-lg:   0 8px 32px rgba(0,0,0,.18);
      --radius:      10px;
    }

    html, body, #app { height: 100%; font-family: 'Inter', sans-serif; color: var(--text-dark); background: var(--sand); }

    #app { display: flex; flex-direction: column; }

    /* ── HEADER ── */
    #header {
      background: var(--green-deep);
      color: white;
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
      z-index: 900;
      flex-shrink: 0;
    }
    #header .logo {
      display: flex; align-items: center; gap: 10px; text-decoration: none; color: white;
    }
    #header .logo-icon {
      width: 36px; height: 36px; background: var(--coral); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
      flex-shrink: 0;
    }
    #header .logo-text { line-height: 1.1; }
    #header .logo-text strong { font-size: .95rem; font-weight: 800; letter-spacing: -.3px; }
    #header .logo-text span { font-size: .68rem; opacity: .65; font-weight: 400; display: block; }

    #header .search-wrap {
      flex: 1; max-width: 340px; position: relative;
    }
    #header .search-wrap input {
      width: 100%; padding: 8px 14px 8px 36px;
      background: rgba(255,255,255,.12); border: 1.5px solid rgba(255,255,255,.2);
      border-radius: 8px; color: white; font-size: .82rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border .2s, background .2s;
    }
    #header .search-wrap input::placeholder { color: rgba(255,255,255,.45); }
    #header .search-wrap input:focus { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.5); }
    #header .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: .85rem; opacity: .55; pointer-events: none; }

    #header .stat-pill {
      margin-left: auto; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18);
      border-radius: 20px; padding: 5px 13px; font-size: .72rem; font-weight: 600;
      white-space: nowrap; letter-spacing: .3px;
    }
    #header .stat-pill span { color: var(--green-light); font-weight: 800; font-size: .82rem; }

    /* ── FILTROS ── */
    #filters {
      background: var(--white);
      border-bottom: 1.5px solid var(--sand-dark);
      padding: 9px 18px;
      display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
      z-index: 800; flex-shrink: 0;
    }
    .filter-label { font-size: .65rem; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .8px; margin-right: 4px; white-space: nowrap; }

    .chip {
      padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--sand-dark);
      background: var(--sand); cursor: pointer; font-size: .74rem; font-weight: 600;
      font-family: 'Inter', sans-serif; color: var(--text-mid);
      display: flex; align-items: center; gap: 4px;
      transition: all .18s; white-space: nowrap;
    }
    .chip:hover { border-color: #aaa; background: var(--white); }
    .chip.active { border-color: transparent; color: white; }

    /* ── LAYOUT PRINCIPAL ── */
    #main { flex: 1; display: flex; overflow: hidden; }

    /* ── MAPA ── */
    #map { width: 100%; height: 100%; z-index: 1; }
    #map-wrap { flex: 1; position: relative; min-height: 0; }

    /* ── PAINEL ── */
    #panel {
      width: 320px; background: var(--white);
      box-shadow: -4px 0 20px rgba(0,0,0,.10);
      display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
      z-index: 100; overflow: hidden; flex-shrink: 0;
    }
    #panel.open { transform: translateX(0); }

    .panel-head {
      padding: 18px 18px 14px;
      border-bottom: 1.5px solid var(--sand-dark);
      position: relative;
    }
    .panel-cat {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .9px; margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
    }
    .panel-cat-dot { width: 8px; height: 8px; border-radius: 50%; }
    .panel-name { font-size: 1.02rem; font-weight: 800; line-height: 1.3; color: var(--text-dark); padding-right: 28px; }
    .panel-close {
      position: absolute; top: 14px; right: 14px;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--sand); border: none; cursor: pointer;
      font-size: .85rem; display: flex; align-items: center; justify-content: center;
      color: var(--text-soft); transition: background .15s;
    }
    .panel-close:hover { background: var(--sand-dark); }

    .panel-body { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 16px; }

    .info-block {}
    .info-block .ib-label { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .9px; color: var(--text-soft); margin-bottom: 4px; }
    .info-block .ib-value { font-size: .84rem; color: var(--text-dark); line-height: 1.5; }

    .services-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .services-list li {
      font-size: .8rem; color: var(--text-mid); padding: 6px 10px;
      background: var(--sand); border-radius: 6px; display: flex; align-items: center; gap: 7px;
    }
    .services-list li::before { content: '✓'; color: var(--green-light); font-weight: 700; font-size: .78rem; flex-shrink: 0; }

    .contact-row {
      display: flex; gap: 10px;
    }
    .contact-card {
      flex: 1; background: var(--sand); border-radius: 8px; padding: 10px 12px;
    }
    .contact-card .cc-label { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--text-soft); margin-bottom: 3px; }
    .contact-card .cc-value { font-size: .82rem; font-weight: 700; color: var(--text-dark); }

    .obs-box {
      background: #FFFBEB; border: 1.5px solid #F6D860; border-radius: 8px; padding: 11px 13px;
    }
    .obs-box .obs-head { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: #92680A; margin-bottom: 4px; }
    .obs-box .obs-text { font-size: .8rem; color: #5C4008; line-height: 1.5; }

    .directions-btn {
      display: block; width: 100%; padding: 11px;
      background: var(--green-deep); color: white; border: none;
      border-radius: 8px; font-size: .82rem; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer; text-align: center;
      text-decoration: none; transition: background .18s; margin-top: 4px;
    }
    .directions-btn:hover { background: var(--green-mid); }

    /* ── EMPTY STATE ── */
    #empty-state {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: white; border-radius: 12px; padding: 14px 20px; text-align: center;
      box-shadow: var(--shadow-md); z-index: 50; display: none;
    }
    #empty-state p { font-size: .82rem; color: var(--text-soft); }

    /* ── CONTADOR ── */
    #counter {
      position: absolute; bottom: 20px; left: 14px; z-index: 50;
      background: white; border-radius: 20px; padding: 6px 14px;
      box-shadow: var(--shadow-md); font-size: .76rem; font-weight: 600; color: var(--text-mid);
      display: flex; align-items: center; gap: 6px;
    }
    #counter .cnt-num { font-weight: 800; color: var(--green-deep); font-size: .85rem; }

    /* ── LEAFLET OVERRIDES ── */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important; box-shadow: var(--shadow-md) !important;
      padding: 0 !important; overflow: hidden;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-container { font-family: 'Inter', sans-serif !important; }

    .map-popup { font-family: 'Inter', sans-serif; min-width: 200px; }
    .mp-head { padding: 10px 14px 8px; border-bottom: 1px solid var(--sand-dark); }
    .mp-cat { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
    .mp-name { font-size: .88rem; font-weight: 800; color: var(--text-dark); line-height: 1.3; }
    .mp-body { padding: 8px 14px 12px; }
    .mp-addr { font-size: .73rem; color: var(--text-soft); margin-bottom: 8px; line-height: 1.4; }
    .mp-btn {
      display: inline-block; padding: 6px 12px;
      background: var(--green-deep); color: white; border: none;
      border-radius: 6px; font-size: .74rem; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer; width: 100%; text-align: center;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <a class="logo" href="#">
      <div class="logo-icon">📍</div>
      <div class="logo-text">
        <strong>HelpMap</strong>
        <span>Canindé · CE</span>
      </div>
    </a>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Buscar local ou serviço…" autocomplete="off"/>
    </div>
    <div class="stat-pill"><span id="total-count">12</span> locais de apoio</div>
  </header>

  <!-- FILTROS -->
  <div id="filters">
    <span class="filter-label">Filtrar:</span>
    <button class="chip active" data-cat="todos" style="background:var(--green-deep);border-color:var(--green-deep);">🗺️ Todos</button>
    <button class="chip" data-cat="saude">🏥 Saúde</button>
    <button class="chip" data-cat="assistencia">🤝 Assistência</button>
    <button class="chip" data-cat="trabalho">💼 Emprego</button>
    <button class="chip" data-cat="alimentacao">🍽️ Alimentação</button>
    <button class="chip" data-cat="brecho">👕 Brechó</button>
    <button class="chip" data-cat="documentos">📄 Documentos</button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="map-wrap">
      <div id="map"></div>
      <div id="counter"><span class="cnt-num" id="counter-num">12</span> locais encontrados</div>
    </div>

    <!-- PAINEL LATERAL -->
    <div id="panel">
      <div class="panel-head" id="panel-head">
        <div class="panel-cat" id="panel-cat"></div>
        <div class="panel-name" id="panel-name"></div>
        <button class="panel-close" id="panel-close">✕</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </div>
</div>

<script>
const CATS = {
  saude:       { cor: '#E74C3C', label: 'Saúde',             emoji: '🏥' },
  assistencia: { cor: '#27AE60', label: 'Assistência Social', emoji: '🤝' },
  trabalho:    { cor: '#2980B9', label: 'Trabalho / Emprego', emoji: '💼' },
  alimentacao: { cor: '#E67E22', label: 'Alimentação',        emoji: '🍽️' },
  brecho:      { cor: '#9B59B6', label: 'Brechó / Roupas',    emoji: '👕' },
  documentos:  { cor: '#7F8C8D', label: 'Documentos',         emoji: '📄' },
}

const PONTOS = [
  { id:1, nome:'Hospital Regional São Francisco', cat:'saude',
    end:'Praça Frei Aurélio, 1397 – Centro', tel:'(85) 3432-1100', hor:'24 horas, todos os dias',
    desc:'Principal hospital público de Canindé. Atende emergências, internações, partos e consultas gerais pelo SUS.',
    servicos:['Emergência 24h','Maternidade e partos','Internação e cirurgia','Consultas médicas SUS'],
    lat:-4.3572, lng:-39.3108 },
  { id:2, nome:'PSF – Capitão Pedro Sampaio', cat:'saude',
    end:'Rua José Paixão, 2208 – Canindé', tel:'(85) 3436-3230', hor:'Seg a Sex, 7h–17h',
    desc:'Unidade básica de saúde da família com equipe multiprofissional. Atendimento preventivo e acompanhamento.',
    servicos:['Consultas clínicas gerais','Vacinação','Pré-natal e acompanhamento','Curativos e enfermagem'],
    lat:-4.3610, lng:-39.3095 },
  { id:3, nome:'PSF – Santa Luzia', cat:'saude',
    end:'Rua Sitônio Monteiro – Santa Luzia', hor:'Seg a Sex, 7h–17h',
    desc:'Unidade de saúde da família do bairro Santa Luzia. Atendimento gratuito e integral pelo SUS.',
    servicos:['Consultas SUS','Vacinação','Acompanhamento nutricional','Saúde da mulher'],
    lat:-4.3640, lng:-39.3060 },
  { id:4, nome:'CAPS – Centro de Atenção Psicossocial', cat:'saude',
    end:'Bela Vista – Canindé', hor:'Seg a Sex, 7h–17h',
    desc:'Saúde mental gratuita pelo SUS. Atende transtornos mentais, sofrimento psíquico e dependência química. Não precisa de encaminhamento.',
    servicos:['Psicologia e psiquiatria','Terapia em grupo','Apoio a dependentes químicos','Acolhimento e escuta'],
    obs:'Não precisa de encaminhamento médico. Qualquer pessoa pode ir diretamente.',
    lat:-4.3595, lng:-39.3070 },
  { id:5, nome:'CEDICA – Centro de Diagnóstico por Imagem', cat:'saude',
    end:'Centro – Canindé', hor:'Seg a Sex, 7h–17h',
    desc:'Centro de especialidades médicas e diagnóstico por imagem de Canindé.',
    servicos:['Ultrassonografia','Raio-X','Exames laboratoriais','Especialidades médicas'],
    lat:-4.3583, lng:-39.3100 },
  { id:6, nome:'CRAS I – Santa Clara', cat:'assistencia',
    end:'Rua Padre José Airton, s/n – Centro', hor:'Seg a Sex, 8h–17h',
    desc:'Porta de entrada dos direitos sociais. Cadastro Único, Bolsa Família e acompanhamento familiar para quem está em situação de vulnerabilidade.',
    servicos:['CadÚnico e Bolsa Família','Proteção e acompanhamento familiar (PAIF)','BPC – Benefício de Prestação Continuada','Serviço de Convivência (crianças e idosos)','Orientação jurídica e social'],
    obs:'Leve RG, CPF e comprovante de residência. O atendimento é gratuito.',
    lat:-4.3580, lng:-39.3125 },
  { id:7, nome:'CREAS – Assistência Social Especializada', cat:'assistencia',
    end:'Largo Francisco Xavier de Medeiros, s/n – Imaculada Conceição', tel:'(85) 9.8595-0460', hor:'Seg a Sex, 7h30–11h30 e 13h–17h',
    desc:'Atende famílias e pessoas em risco pessoal ou social: violência doméstica, abuso, negligência e exploração.',
    servicos:['Proteção a vítimas de violência','Apoio a mulheres em vulnerabilidade','Orientação a adolescentes em conflito com a lei','Encaminhamento para acolhimento'],
    lat:-4.3560, lng:-39.3090 },
  { id:8, nome:'Conselho Tutelar de Canindé', cat:'assistencia',
    end:'Centro – Canindé', hor:'Seg a Sex, 8h–17h (plantões disponíveis)',
    desc:'Protege os direitos de crianças e adolescentes. Atua em casos de violência, abandono e abuso.',
    servicos:['Denúncias de violência infantil','Proteção de crianças e adolescentes','Encaminhamento para serviços sociais','Visitas domiciliares'],
    obs:'Emergências: acione também o 190 (Polícia) ou 100 (Disque Direitos Humanos).',
    lat:-4.3570, lng:-39.3110 },
  { id:9, nome:'Posto IDT/SINE – Canindé', cat:'trabalho',
    end:'Canindé – CE (Prefeitura + IDT/Sedet)', tel:'158 (gratuito)', hor:'Seg a Sex, 8h–17h',
    desc:'Sistema Nacional de Emprego em Canindé. Inaugurado em 2022, atendeu mais de 5.400 trabalhadores no primeiro ano.',
    servicos:['Vagas de emprego','Intermediação e encaminhamento','Seguro-desemprego','Qualificação profissional','Emissão de Carteira de Trabalho'],
    obs:'Leve RG, CPF e Carteira de Trabalho. Atendimento gratuito.',
    lat:-4.3590, lng:-39.3115 },
  { id:10, nome:'Cozinha Solidária – Cachoeira dos Vasconcelos', cat:'alimentacao',
    end:'Comunidade Cachoeira dos Vasconcelos, s/n – Canindé', hor:'Consultar dias de funcionamento',
    desc:'Cozinha comunitária vinculada ao programa Ceará Sem Fome. Serve refeições a famílias em vulnerabilidade alimentar.',
    servicos:['Refeições gratuitas ou a preço popular','Prioridade para idosos, crianças e grávidas','Distribuição de cestas básicas'],
    lat:-4.3618, lng:-39.3080 },
  { id:11, nome:'Brechó Solidário – Centro', cat:'brecho',
    end:'Centro – Canindé', hor:'Consultar horário na unidade',
    desc:'Roupas, calçados e acessórios doados pela comunidade. Peças a preços simbólicos ou gratuitas para quem mais precisa.',
    servicos:['Roupas adulto e infantil','Calçados e acessórios','Peças a preço simbólico','Recebe doações da comunidade'],
    lat:-4.3565, lng:-39.3088 },
  { id:12, nome:'Emissão de CIN/RG – Prefeitura de Canindé', cat:'documentos',
    end:'Rua Sitônio Monteiro, 999 – Santa Luzia', hor:'Seg a Sex, 7h30–11h30 e 13h–17h',
    desc:'Serviço da Secretaria de Assistência Social de Canindé para emissão da Carteira de Identidade Nacional (CIN).',
    servicos:['Emissão de RG – 1ª via gratuita','Carteira de Identidade Nacional (CIN)','Atendimento prioritário para zona rural (sem agendamento)'],
    obs:'Documentos: Certidão de Nascimento ou Casamento original, CPF e comprovante de residência. Agendamento pelo site da Prefeitura.',
    lat:-4.3642, lng:-39.3055 },
]

// --- MAP ---
const map = L.map('map', { zoomControl: false }).setView([-4.3595, -39.3095], 15)
L.control.zoom({ position: 'bottomright' }).addTo(map)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a>'
}).addTo(map)

function makeIcon(cat) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:36px;height:36px;border-radius:50%;
      background:${CATS[cat].cor};border:3px solid white;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
      display:flex;align-items:center;justify-content:center;
      font-size:14px;cursor:pointer;transition:transform .15s;
    ">${CATS[cat].emoji}</div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -22],
  })
}

const markers = []
PONTOS.forEach(p => {
  const cat = CATS[p.cat]
  const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.cat) }).addTo(map)
  m.bindPopup(`
    <div class="map-popup">
      <div class="mp-head">
        <div class="mp-cat" style="color:${cat.cor}">${cat.emoji} ${cat.label}</div>
        <div class="mp-name">${p.nome}</div>
      </div>
      <div class="mp-body">
        <div class="mp-addr">📌 ${p.end}</div>
        <button class="mp-btn" onclick="openPanel(${p.id})">Ver detalhes →</button>
      </div>
    </div>
  `, { closeButton: false, maxWidth: 240 })
  markers.push({ ponto: p, marker: m, visible: true })
})

// --- PANEL ---
const panel = document.getElementById('panel')
const panelCat = document.getElementById('panel-cat')
const panelName = document.getElementById('panel-name')
const panelBody = document.getElementById('panel-body')

window.openPanel = function(id) {
  const p = PONTOS.find(x => x.id === id)
  if (!p) return
  const cat = CATS[p.cat]

  panelCat.innerHTML = `<div class="panel-cat-dot" style="background:${cat.cor}"></div><span style="color:${cat.cor}">${cat.emoji} ${cat.label}</span>`
  panelName.textContent = p.nome

  let html = `
    <div class="info-block">
      <div class="ib-label">📌 Endereço</div>
      <div class="ib-value">${p.end}</div>
    </div>
    <div class="info-block">
      <div class="ib-label">ℹ️ Sobre</div>
      <div class="ib-value">${p.desc}</div>
    </div>
    <div class="info-block">
      <div class="ib-label">✅ Serviços oferecidos</div>
      <ul class="services-list">${p.servicos.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>
  `

  if (p.tel || p.hor) {
    html += `<div class="contact-row">`
    if (p.tel) html += `<div class="contact-card"><div class="cc-label">📞 Telefone</div><div class="cc-value">${p.tel}</div></div>`
    if (p.hor) html += `<div class="contact-card"><div class="cc-label">🕐 Horário</div><div class="cc-value">${p.hor}</div></div>`
    html += `</div>`
  } else if (p.hor) {
    html += `<div class="info-block"><div class="ib-label">🕐 Horário</div><div class="ib-value">${p.hor}</div></div>`
  }

  if (p.obs) {
    html += `<div class="obs-box"><div class="obs-head">⚠️ Atenção</div><div class="obs-text">${p.obs}</div></div>`
  }

  html += `<a class="directions-btn" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.nome+' Canindé CE')}" target="_blank">🗺️ Abrir no Google Maps</a>`

  panelBody.innerHTML = html
  panel.classList.add('open')
  map.closePopup()
}

document.getElementById('panel-close').onclick = () => panel.classList.remove('open')

// --- FILTROS ---
let filtroAtivo = 'todos'

document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    filtroAtivo = btn.dataset.cat
    document.querySelectorAll('.chip').forEach(b => {
      b.classList.remove('active')
      b.style.background = ''
      b.style.borderColor = ''
      b.style.color = ''
    })
    btn.classList.add('active')
    if (filtroAtivo === 'todos') {
      btn.style.background = 'var(--green-deep)'
      btn.style.borderColor = 'var(--green-deep)'
      btn.style.color = 'white'
    } else {
      const cor = CATS[filtroAtivo].cor
      btn.style.background = cor
      btn.style.borderColor = cor
      btn.style.color = 'white'
    }
    aplicarFiltros()
  })
})

function aplicarFiltros() {
  const busca = document.getElementById('search-input').value.toLowerCase().trim()
  let count = 0
  markers.forEach(({ ponto, marker }) => {
    const matchCat = filtroAtivo === 'todos' || ponto.cat === filtroAtivo
    const matchBusca = !busca || ponto.nome.toLowerCase().includes(busca) ||
      ponto.desc.toLowerCase().includes(busca) ||
      ponto.servicos.some(s => s.toLowerCase().includes(busca))
    if (matchCat && matchBusca) { marker.addTo(map); count++ }
    else map.removeLayer(marker)
  })
  document.getElementById('counter-num').textContent = count
}

document.getElementById('search-input').addEventListener('input', aplicarFiltros)
</script>
</body>
</html>
